name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Parses Conventional Commits on main and maintains a release PR that
      # bumps the version in pyproject.toml, updates CHANGELOG.md, and tags a
      # GitHub release when merged. feat -> minor, fix -> patch, ! -> major.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
